<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ExamPortal - Register</title>
    <link rel="stylesheet" href="../Css/register.css" />
  </head>
  <body>
    <div class="main-container">
      <div class="intro">
        <div class="intro-content">
          <img src="imgs/open-book.png" alt="Logo" class="logo">
          <h1>Welcome to <br><span>ExamPortal</span></h1>
          <p>Join thousands of students in taking their examinations online with our modern, secure, and user-friendly platform.</p>
        </div>
      </div>

      <div class="regestiration-form">
        <span class="start-form"> <img src="imgs/christmas-stars.png"> GET STARTED</span>
        <div class="form-info">
          <h2>Create your account</h2>
          <p>Fill in your details to register</p>
        </div>

        <form class="Form">
          <div class="input-row">
            <div class="input-group">
              <label for="firstName">First Name</label>
              <input type="text" id="firstName" name="fname" placeholder="John">
              <span id="firstNameError" class="error-message"></span>
            </div>
            <div class="input-group">
              <label for="lastName">Last Name</label>
              <input type="text" id="lastName" name="lname" placeholder="Doe">
              <span id="lastNameError" class="error-message"></span>
            </div>
          </div>

          <div class="input-group full-width">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="john.doe@example.com">
            <span id="emailError" class="error-message"></span>
          </div>

          <div class="input-group full-width">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Minimum 8 characters">
            <span id="passwordError" class="error-message"></span>
          </div>

          <div class="input-group full-width">
            <label for="repassword">Re-enter Password</label>
            <input type="password" id="repassword" name="repassword" placeholder="Confirm your password">
            <span id="repasswordError" class="error-message"></span>
          </div>

          <button type="submit" class="submit-btn">Create Account</button>
        </form>
        <p class="signin-text">Already have an account? <a href="login.html">Sign In</a></p>
      </div>
    </div>

   
    <script src="register.js"></script>
  </body>
</html>
